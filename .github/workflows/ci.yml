name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Covers the three supported targets: Linux x64, Windows x64,
        # and macOS arm64 (macos-14 runners are Apple Silicon).
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `npm test` runs pretest (tsc compile + eslint) and then the VS Code
      # extension test host. Linux runners are headless, so wrap in xvfb.
      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Test (Windows / macOS)
        if: runner.os != 'Linux'
        run: npm test
